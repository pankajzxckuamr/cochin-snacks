<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E6B2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F0F0F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD600;stop-opacity:1" />
    </linearGradient>
    <!-- Spice dot pattern -->
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#3CC120" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot texture overlay -->
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Flame-orange border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="12" ry="12"
        fill="none" stroke="#FF6B00" stroke-width="3" opacity="0.7"/>
  <rect x="32" y="32" width="1136" height="566" rx="8" ry="8"
        fill="none" stroke="#FFD600" stroke-width="1" opacity="0.4"/>

  <!-- Decorative corner accents -->
  <line x1="24" y1="80" x2="24" y2="24" stroke="#FFD600" stroke-width="3"/>
  <line x1="24" y1="24" x2="80" y2="24" stroke="#FFD600" stroke-width="3"/>
  <line x1="1176" y1="80" x2="1176" y2="24" stroke="#FFD600" stroke-width="3"/>
  <line x1="1176" y1="24" x2="1120" y2="24" stroke="#FFD600" stroke-width="3"/>
  <line x1="24" y1="550" x2="24" y2="606" stroke="#FFD600" stroke-width="3"/>
  <line x1="24" y1="606" x2="80" y2="606" stroke="#FFD600" stroke-width="3"/>
  <line x1="1176" y1="550" x2="1176" y2="606" stroke="#FFD600" stroke-width="3"/>
  <line x1="1176" y1="606" x2="1120" y2="606" stroke="#FFD600" stroke-width="3"/>

  <!-- Brand tagline above -->
  <text x="600" y="200" font-family="Georgia, serif" font-size="22"
        fill="#3CC120" text-anchor="middle" letter-spacing="8" opacity="0.9">
    KERALA'S FINEST SINCE 1985
  </text>

  <!-- Main brand name -->
  <text x="600" y="310" font-family="Georgia, 'Times New Roman', serif"
        font-size="110" font-weight="900" fill="url(#textGrad)"
        text-anchor="middle" letter-spacing="4">
    COCHIN SNACKS
  </text>

  <!-- Divider line -->
  <line x1="300" y1="345" x2="900" y2="345" stroke="#FFD600" stroke-width="2" opacity="0.6"/>
  <circle cx="600" cy="345" r="5" fill="#FF6B00"/>

  <!-- Subtitle -->
  <text x="600" y="400" font-family="Georgia, serif" font-size="32"
        fill="#FAFAF0" text-anchor="middle" letter-spacing="3" opacity="0.9">
    Authentic Kerala Flavours
  </text>

  <!-- URL -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="20"
        fill="#FFD600" text-anchor="middle" letter-spacing="2" opacity="0.7">
    www.cochinsnacks.com
  </text>

  <!-- Flame emoji-style decoration -->
  <text x="260" y="320" font-size="60" text-anchor="middle" opacity="0.6">🌶️</text>
  <text x="940" y="320" font-size="60" text-anchor="middle" opacity="0.6">🌶️</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <!-- Background gradients -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E6B2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F0F0F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bananaLeafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3CC120;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E6B2E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yellowBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CCB000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8230A;stop-opacity:1" />
    </linearGradient>
    <pattern id="snackDots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#FFD600" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect width="600" height="600" rx="24" fill="url(#cardBg)" />
  <rect width="600" height="600" rx="24" fill="url(#snackDots)" />

  <!-- Outer gold border -->
  <rect x="15" y="15" width="570" height="570" rx="20" fill="none" stroke="#FFD600" stroke-width="2" opacity="0.6"/>

  <!-- Banana Leaf Silhouette in Background -->
  <path d="M 120 480 Q 250 400 480 480 Q 380 320 120 480 Z" fill="url(#bananaLeafGrad)" opacity="0.3" />
  <path d="M 100 490 Q 230 420 450 490" stroke="#FFD600" stroke-width="1.5" opacity="0.2" stroke-dasharray="5,5" fill="none" />

  <!-- Stylized Snack Bowl -->
  <ellipse cx="300" cy="380" rx="140" ry="50" fill="#0F0F0F" stroke="#FF6B00" stroke-width="3" />
  <!-- Golden Chips in Bowl -->
  <path d="M 230 370 Q 260 340 290 365" stroke="#FFD600" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.9" />
  <path d="M 270 360 Q 300 330 330 355" stroke="#FFD600" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.9" />
  <path d="M 310 370 Q 340 340 370 365" stroke="#FFD600" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.9" />
  <path d="M 200 380 Q 240 360 270 380" stroke="#FFE94D" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.95" />
  <path d="M 260 380 Q 300 355 340 380" stroke="#FFE94D" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.95" />
  <path d="M 320 380 Q 360 360 400 380" stroke="#FFE94D" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.95" />

  <!-- Flame Accent -->
  <path d="M 300 320 Q 280 290 300 260 Q 320 290 300 320 Z" fill="url(#flameGrad)" />

  <!-- Logo/Brand Badge -->
  <rect x="150" y="80" width="300" height="130" rx="12" fill="#0F0F0F" stroke="#3CC120" stroke-width="2" />
  
  <text x="300" y="125" font-family="Georgia, serif" font-size="14" fill="#3CC120" text-anchor="middle" letter-spacing="4" font-weight="bold">
    AUTHENTIC KERALA
  </text>
  
  <text x="300" y="165" font-family="Georgia, serif" font-size="32" fill="url(#yellowBrand)" text-anchor="middle" font-weight="900" letter-spacing="1">
    COCHIN SNACKS
  </text>

  <text x="300" y="195" font-family="Georgia, serif" font-size="12" fill="#FAFAF0" text-anchor="middle" letter-spacing="2" opacity="0.8">
    TRADITIONAL FLAVOURS
  </text>

  <!-- Certification Badge Graphic -->
  <circle cx="510" cy="90" r="28" fill="#1E6B2E" stroke="#FFD600" stroke-width="2" />
  <text x="510" y="86" font-family="Arial, sans-serif" font-size="9" fill="#FFD600" text-anchor="middle" font-weight="bold">FSSAI</text>
  <text x="510" y="98" font-family="Arial, sans-serif" font-size="8" fill="#FAFAF0" text-anchor="middle">CERTIFIED</text>

  <!-- Footer Tagline -->
  <text x="300" y="500" font-family="Arial, sans-serif" font-size="18" fill="#FAFAF0" text-anchor="middle" opacity="0.9" font-weight="bold">
    100% Coconut Oil &amp; Natural Spices
  </text>
  
  <text x="300" y="530" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#3CC120" text-anchor="middle" opacity="0.8">
    Crunchy • Fresh • Delicious
  </text>
</svg>
